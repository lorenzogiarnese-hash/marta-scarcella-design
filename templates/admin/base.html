<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Admin — Marta Scarcella Design{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F7F6F2;
      --surface: #FFFFFF;
      --border: #E5E2DC;
      --charcoal: #1C1C1A;
      --mid: #6B6860;
      --light: #B8B5AE;
      --accent: #C9A96E;
      --danger: #E24B4A;
      --success: #2D9B6F;
      --sidebar-w: 240px;
    }

    body {
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      background: var(--bg);
      color: var(--charcoal);
      line-height: 1.6;
    }

    .layout { display: flex; min-height: 100vh; }

    /* SIDEBAR */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--charcoal);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 10;
    }

    .sidebar-logo {
      padding: 1.8rem 1.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .sidebar-logo span {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      display: block;
      margin-bottom: 0.3rem;
    }

    .sidebar-logo strong {
      font-size: 0.95rem;
      font-weight: 400;
      color: white;
    }

    .sidebar-nav { flex: 1; padding: 1.5rem 0; }

    .nav-section {
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #5A5750;
      padding: 0 1.5rem;
      margin: 1.2rem 0 0.5rem;
    }

    .sidebar-nav a {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.65rem 1.5rem;
      font-size: 0.85rem;
      color: #A8A49E;
      text-decoration: none;
      transition: all 0.2s;
      border-left: 2px solid transparent;
    }

    .sidebar-nav a:hover { color: white; background: rgba(255,255,255,0.04); }
    .sidebar-nav a.active { color: white; border-left-color: var(--accent); background: rgba(201,169,110,0.08); }

    .sidebar-nav a .icon { font-size: 1rem; width: 18px; text-align: center; }

    .badge-count {
      margin-left: auto;
      background: var(--danger);
      color: white;
      font-size: 0.65rem;
      padding: 1px 6px;
      border-radius: 10px;
    }

    .sidebar-footer {
      padding: 1.2rem 1.5rem;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .sidebar-footer a {
      font-size: 0.75rem;
      color: #5A5750;
      text-decoration: none;
      transition: color 0.2s;
    }

    .sidebar-footer a:hover { color: var(--danger); }

    /* MAIN */
    .main-content {
      margin-left: var(--sidebar-w);
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .topbar h1 {
      font-size: 1rem;
      font-weight: 500;
      color: var(--charcoal);
    }

    .topbar-actions { display: flex; gap: 0.75rem; }

    .page-body { padding: 2rem; flex: 1; }

    /* CARDS */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .card-title {
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--light);
      margin-bottom: 1.2rem;
    }

    /* STAT CARDS */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 2rem; }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.2rem 1.5rem;
    }

    .stat-label { font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--light); margin-bottom: 0.5rem; }
    .stat-num { font-size: 2rem; font-weight: 300; color: var(--charcoal); line-height: 1; }
    .stat-card.accent .stat-num { color: var(--accent); }
    .stat-card.danger .stat-num { color: var(--danger); }

    /* TABLE */
    .table-wrap { overflow-x: auto; }

    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    th {
      text-align: left;
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--light);
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      font-weight: 400;
    }
    td {
      padding: 0.85rem 1rem;
      border-bottom: 1px solid var(--border);
      color: var(--mid);
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--bg); }

    .td-title { color: var(--charcoal); font-weight: 400; }

    /* BADGES */
    .badge {
      display: inline-block;
      font-size: 0.65rem;
      padding: 2px 8px;
      border-radius: 4px;
      letter-spacing: 0.08em;
    }
    .badge-green { background: #EAF3DE; color: #3B6D11; }
    .badge-gray  { background: #F1EFE8; color: #5F5E5A; }
    .badge-red   { background: #FCEBEB; color: #A32D2D; }
    .badge-amber { background: #FAEEDA; color: #854F0B; }

    /* BUTTONS */
    .btn {
      display: inline-block;
      padding: 0.55rem 1.2rem;
      font-family: 'Jost', sans-serif;
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      border: 1px solid var(--charcoal);
      color: var(--charcoal);
      background: transparent;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .btn:hover { background: var(--charcoal); color: white; }
    .btn-accent { background: var(--accent); border-color: var(--accent); color: white; }
    .btn-accent:hover { background: #B8925A; border-color: #B8925A; }
    .btn-danger { border-color: var(--danger); color: var(--danger); }
    .btn-danger:hover { background: var(--danger); color: white; }
    .btn-sm { padding: 0.35rem 0.8rem; font-size: 0.68rem; }

    /* FORM */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-group { margin-bottom: 1.2rem; }
    .form-group.full { grid-column: 1 / -1; }

    label {
      display: block;
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--light);
      margin-bottom: 0.4rem;
    }

    input[type=text], input[type=email], input[type=number],
    input[type=password], select, textarea {
      width: 100%;
      padding: 0.7rem 0.9rem;
      font-family: 'Jost', sans-serif;
      font-size: 0.875rem;
      font-weight: 300;
      color: var(--charcoal);
      background: var(--bg);
      border: 1px solid var(--border);
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus, select:focus, textarea:focus { border-color: var(--accent); background: white; }
    textarea { resize: vertical; min-height: 140px; line-height: 1.7; }

    .checkbox-group { display: flex; align-items: center; gap: 0.5rem; }
    .checkbox-group input[type=checkbox] { width: auto; }
    .checkbox-group label { margin: 0; font-size: 0.8rem; text-transform: none; letter-spacing: 0; color: var(--mid); }

    .form-actions {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      margin-top: 1rem;
    }

    .alert {
      padding: 0.8rem 1.2rem;
      border-radius: 4px;
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
    }
    .alert-success { background: #EAF3DE; color: #3B6D11; }
    .alert-error   { background: #FCEBEB; color: #A32D2D; }

    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--light);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
<div class="layout">

  <aside class="sidebar">
    <div class="sidebar-logo">
      <span>Area Admin</span>
      <strong>Marta Scarcella Design</strong>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">Generale</div>
      <a href="/admin" class="{{ 'active' if request.url.path == '/admin' else '' }}">
        <span class="icon">◈</span> Dashboard
      </a>
      <div class="nav-section">Contenuti</div>
      <a href="/admin/progetti" class="{{ 'active' if '/admin/progetti' in request.url.path else '' }}">
        <span class="icon">◻</span> Progetti
      </a>
      <a href="/admin/articoli" class="{{ 'active' if '/admin/articoli' in request.url.path else '' }}">
        <span class="icon">◇</span> Articoli
      </a>
      <a href="/admin/servizi" class="{{ 'active' if '/admin/servizi' in request.url.path else '' }}">
        <span class="icon">◈</span> Servizi
      </a>
      <div class="nav-section">Clienti</div>
      <a href="/admin/messaggi" class="{{ 'active' if '/admin/messaggi' in request.url.path else '' }}">
        <span class="icon">◉</span> Messaggi
      </a>
    </nav>
    <div class="sidebar-footer">
      <a href="/" target="_blank">↗ Vedi sito</a>
      &nbsp;&nbsp;
      <a href="/admin/logout">Esci</a>
    </div>
  </aside>

  <div class="main-content">
    <div class="topbar">
      <h1>{% block page_title %}{% endblock %}</h1>
      <div class="topbar-actions">{% block topbar_actions %}{% endblock %}</div>
    </div>
    <div class="page-body">
      {% block content %}{% endblock %}
    </div>
  </div>

</div>
</body>
</html>
