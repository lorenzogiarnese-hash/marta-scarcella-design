<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accesso Admin — Marta Scarcella Design</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      background: #1C1C1A;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      background: #252522;
      border: 1px solid rgba(255,255,255,0.08);
      padding: 3rem;
      width: 100%;
      max-width: 400px;
    }
    .login-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      font-weight: 300;
      color: white;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }
    .login-logo span { color: #C9A96E; }
    .login-sub {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #5A5750;
      margin-bottom: 2.5rem;
    }
    .form-group { margin-bottom: 1.2rem; }
    label {
      display: block;
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #7A756E;
      margin-bottom: 0.4rem;
    }
    input {
      width: 100%;
      padding: 0.8rem 1rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: white;
      font-family: 'Jost', sans-serif;
      font-size: 0.9rem;
      font-weight: 300;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #C9A96E; }
    input::placeholder { color: #4A4740; }
    .btn-login {
      width: 100%;
      padding: 0.9rem;
      background: #C9A96E;
      border: none;
      color: white;
      font-family: 'Jost', sans-serif;
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.2s;
    }
    .btn-login:hover { background: #B8925A; }
    .errore {
      background: rgba(226,75,74,0.15);
      border: 1px solid rgba(226,75,74,0.3);
      color: #E24B4A;
      padding: 0.7rem 1rem;
      font-size: 0.82rem;
      margin-bottom: 1.2rem;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-logo">Marta Scarcella <span>&middot;</span> Design</div>
    <div class="login-sub">Area riservata</div>

    {% if errore %}
    <div class="errore">{{ errore }}</div>
    {% endif %}

    <form method="POST" action="/admin/login">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="admin@esempio.it" required autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-login">Accedi</button>
    </form>
  </div>
</body>
</html>
